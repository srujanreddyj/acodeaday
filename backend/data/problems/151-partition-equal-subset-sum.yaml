title: Partition Equal Subset Sum
sequence_number: 151
difficulty: medium
pattern:
  - dynamic-programming
  - knapsack
  - arrays

description: |
  Given an integer array `nums`, return `true` if you can partition the array into two subsets such that the sum of the elements in both subsets is equal or `false` otherwise.

constraints:
  - "1 <= nums.length <= 200"
  - "1 <= nums[i] <= 100"

examples:
  - input: "nums = [1,5,11,5]"
    output: "true"
    explanation: "The array can be partitioned as [1, 5, 5] and [11]."
  - input: "nums = [1,2,3,5]"
    output: "false"
    explanation: "The array cannot be partitioned into equal sum subsets."

languages:
  python:
    starter_code: |
      class Solution:
          def canPartition(self, nums: List[int]) -> bool:
              pass
    reference_solution: |
      class Solution:
          def canPartition(self, nums: List[int]) -> bool:
              total = sum(nums)

              # If total is odd, cannot partition equally
              if total % 2 != 0:
                  return False

              target = total // 2
              dp = set([0])

              for num in nums:
                  new_dp = set()
                  for s in dp:
                      if s + num == target:
                          return True
                      new_dp.add(s + num)
                  dp.update(new_dp)

              return target in dp
    function_signature:
      name: canPartition
      params:
        - name: nums
          type: "List[int]"
      return_type: bool

test_cases:
