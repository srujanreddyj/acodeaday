title: Minimum Interval to Include Each Query
sequence_number: 152
difficulty: hard
pattern:
  - heap
  - sorting
  - intervals
  - sweep-line

description: |
  You are given a 2D integer array `intervals`, where `intervals[i] = [lefti, righti]` describes the `ith` interval starting at `lefti` and ending at `righti` (inclusive). The **size** of an interval is defined as the number of integers it contains, or more formally `righti - lefti + 1`.

  You are also given an integer array `queries`. The answer to the `jth` query is the **size of the smallest interval** `i` such that `lefti <= queries[j] <= righti`. If no such interval exists, the answer is `-1`.

  Return an array containing the answers to the queries.

constraints:
  - "1 <= intervals.length <= 10^5"
  - "1 <= queries.length <= 10^5"
  - "intervals[i].length == 2"
  - "1 <= lefti <= righti <= 10^7"
  - "1 <= queries[j] <= 10^7"

examples:
  - input: "intervals = [[1,4],[2,4],[3,6],[4,4]], queries = [2,3,4,5]"
    output: "[3,3,1,4]"
    explanation: "The queries are processed as follows:
      - Query = 2: The interval [2,4] is the smallest interval containing 2. The answer is 4 - 2 + 1 = 3.
      - Query = 3: The interval [2,4] is the smallest interval containing 3. The answer is 4 - 2 + 1 = 3.
      - Query = 4: The interval [4,4] is the smallest interval containing 4. The answer is 4 - 4 + 1 = 1.
      - Query = 5: The interval [3,6] is the smallest interval containing 5. The answer is 6 - 3 + 1 = 4."
  - input: "intervals = [[2,3],[2,5],[1,8],[20,25]], queries = [2,19,5,22]"
    output: "[2,-1,4,6]"
    explanation: "The queries are processed as follows:
      - Query = 2: The interval [2,3] is the smallest interval containing 2. The answer is 3 - 2 + 1 = 2.
      - Query = 19: None of the intervals contain 19. The answer is -1.
      - Query = 5: The interval [2,5] is the smallest interval containing 5. The answer is 5 - 2 + 1 = 4.
      - Query = 22: The interval [20,25] is the smallest interval containing 22. The answer is 25 - 20 + 1 = 6."

languages:
  python:
    starter_code: |
      class Solution:
          def minInterval(self, intervals: List[List[int]], queries: List[int]) -> List[int]:
              pass
    reference_solution: |
      class Solution:
          def minInterval(self, intervals: List[List[int]], queries: List[int]) -> List[int]:
              import heapq

              # Sort intervals by start
              intervals.sort()

              # Sort queries but keep track of original indices
              sorted_queries = sorted(enumerate(queries), key=lambda x: x[1])

              result = [-1] * len(queries)
              min_heap = []  # (size, end)
              i = 0

              for idx, q in sorted_queries:
                  # Add all intervals that start <= q
                  while i < len(intervals) and intervals[i][0] <= q:
                      left, right = intervals[i]
                      size = right - left + 1
                      heapq.heappush(min_heap, (size, right))
                      i += 1

                  # Remove intervals that end before q
                  while min_heap and min_heap[0][1] < q:
                      heapq.heappop(min_heap)

                  # The smallest valid interval
                  if min_heap:
                      result[idx] = min_heap[0][0]

              return result
    function_signature:
      name: minInterval
      params:
        - name: intervals
          type: "List[List[int]]"
        - name: queries
          type: "List[int]"
      return_type: "List[int]"

