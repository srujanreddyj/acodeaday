title: Detect Squares
sequence_number: 153
difficulty: medium
pattern:
  - hash-map
  - math
  - geometry
  - design

description: |
  You are given a stream of points on the X-Y plane. Design an algorithm that:

  - **Adds** new points from the stream into a data structure. **Duplicate** points are allowed and should be treated as different points.
  - Given a query point, **counts** the number of ways to choose three points from the data structure such that the three points and the query point form an **axis-aligned square** with **positive area**.

  An **axis-aligned square** is a square whose edges are all the same length and are either parallel or perpendicular to the x-axis and y-axis.

  Implement the `DetectSquares` class:

  - `DetectSquares()` Initializes the object with an empty data structure.
  - `void add(int[] point)` Adds a new point `point = [x, y]` to the data structure.
  - `int count(int[] point)` Counts the number of ways to form **axis-aligned squares** with point `point = [x, y]` as described above.

constraints:
  - "point.length == 2"
  - "0 <= x, y <= 1000"
  - "At most 3000 calls in total will be made to add and count"

examples:
  - input: '["DetectSquares", "add", "add", "add", "count", "count", "add", "count"]
[[], [[3, 10]], [[11, 2]], [[3, 2]], [[11, 10]], [[14, 8]], [[11, 2]], [[11, 10]]]'
    output: "[null, null, null, null, 1, 0, null, 2]"
    explanation: "DetectSquares detectSquares = new DetectSquares();
detectSquares.add([3, 10]);
detectSquares.add([11, 2]);
detectSquares.add([3, 2]);
detectSquares.count([11, 10]); // return 1. You can choose: - The first, second, and third points
detectSquares.count([14, 8]);  // return 0. The query point cannot form a square with any points in the data structure.
detectSquares.add([11, 2]);    // Duplicate points are allowed.
detectSquares.count([11, 10]); // return 2. You can choose: - The first, second, and third points - The first, third, and fourth points"

languages:
  python:
    starter_code: |
      class Solution:
          def executeDetectSquaresOperations(self, operations: List[List]) -> List:
              pass
    reference_solution: |
      class Solution:
          def executeDetectSquaresOperations(self, operations: List[List]) -> List:
              from collections import defaultdict

              class DetectSquares:
                  def __init__(self):
                      self.points = defaultdict(int)
                      self.x_points = defaultdict(list)

                  def add(self, point):
                      x, y = point
                      self.points[(x, y)] += 1
                      self.x_points[x].append(y)

                  def count(self, point):
                      x1, y1 = point
                      result = 0

                      for y2 in self.x_points[x1]:
                          if y2 == y1:
                              continue

                          side = abs(y2 - y1)

                          # Check for squares on both sides
                          # Right side: x1 + side
                          x2 = x1 + side
                          result += self.points[(x2, y1)] * self.points[(x2, y2)]

                          # Left side: x1 - side
                          x2 = x1 - side
                          result += self.points[(x2, y1)] * self.points[(x2, y2)]

                      return result

              results = []
              ds = None

              for op in operations:
                  if op[0] == "DetectSquares":
                      ds = DetectSquares()
                      results.append(None)
                  elif op[0] == "add":
                      ds.add(op[1])
                      results.append(None)
                  elif op[0] == "count":
                      results.append(ds.count(op[1]))

              return results
    function_signature:
      name: executeDetectSquaresOperations
      params:
        - name: operations
          type: "List[List]"
      return_type: List

