  - input: [[["JFK", "SFO"], ["SFO", "LAX"], ["LAX", "JFK"], ["JFK", "SFO"], ["SFO", "DEN"]]]
    expected: ["JFK", "SFO", "LAX", "JFK", "SFO", "DEN"]
  - input: [[["JFK", "NYC"], ["NYC", "BOS"], ["BOS", "NYC"], ["NYC", "JFK"]]]
