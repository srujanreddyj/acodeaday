title: Reconstruct Itinerary
sequence_number: 146
difficulty: hard
pattern:
  - graph
  - dfs
  - eulerian-path
  - backtracking

description: |
  You are given a list of airline `tickets` where `tickets[i] = [fromi, toi]` represent the departure and the arrival airports of one flight. Reconstruct the itinerary in order and return it.

  All of the tickets belong to a man who departs from `"JFK"`, thus, the itinerary must begin with `"JFK"`. If there are multiple valid itineraries, you should return the itinerary that has the smallest lexical order when read as a single string.

  - For example, the itinerary `["JFK", "LGA"]` has a smaller lexical order than `["JFK", "LGB"]`.

  You may assume all tickets form at least one valid itinerary. You must use all the tickets once and only once.

constraints:
  - "1 <= tickets.length <= 300"
  - "tickets[i].length == 2"
  - "fromi.length == 3"
  - "toi.length == 3"
  - "fromi and toi consist of uppercase English letters"
  - "fromi != toi"

examples:
  - input: 'tickets = [["MUC","LHR"],["JFK","MUC"],["SFO","SJC"],["LHR","SFO"]]'
    output: '["JFK","MUC","LHR","SFO","SJC"]'
  - input: 'tickets = [["JFK","SFO"],["JFK","ATL"],["SFO","ATL"],["ATL","JFK"],["ATL","SFO"]]'
    output: '["JFK","ATL","JFK","SFO","ATL","SFO"]'
    explanation: 'Another possible reconstruction is ["JFK","SFO","ATL","JFK","ATL","SFO"] but it is larger in lexical order.'

languages:
  python:
    starter_code: |
      class Solution:
          def findItinerary(self, tickets: List[List[str]]) -> List[str]:
              pass
    reference_solution: |
      class Solution:
          def findItinerary(self, tickets: List[List[str]]) -> List[str]:
              from collections import defaultdict

              # Build adjacency list with sorted destinations
              graph = defaultdict(list)
              for src, dst in sorted(tickets, reverse=True):
                  graph[src].append(dst)

              result = []

              def dfs(airport):
                  while graph[airport]:
                      next_airport = graph[airport].pop()
                      dfs(next_airport)
                  result.append(airport)

              dfs("JFK")
              return result[::-1]
    function_signature:
      name: findItinerary
      params:
        - name: tickets
          type: "List[List[str]]"
      return_type: "List[str]"

test_cases:
  - input: [[["MUC", "LHR"], ["JFK", "MUC"], ["SFO", "SJC"], ["LHR", "SFO"]]]
    expected: ["JFK", "MUC", "LHR", "SFO", "SJC"]
  - input: [[["JFK", "SFO"], ["JFK", "ATL"], ["SFO", "ATL"], ["ATL", "JFK"], ["ATL", "SFO"]]]
    expected: ["JFK", "ATL", "JFK", "SFO", "ATL", "SFO"]
  - input: [[["JFK", "KUL"], ["JFK", "NRT"], ["NRT", "JFK"]]]
    expected: ["JFK", "NRT", "JFK", "KUL"]
  - input: [[["JFK", "AAA"]]]
    expected: ["JFK", "AAA"]
  - input: [[["JFK", "BBB"], ["JFK", "AAA"], ["AAA", "JFK"]]]
    expected: ["JFK", "AAA", "JFK", "BBB"]
  - input: [[["EZE", "TIA"], ["EZE", "HBA"], ["AXA", "TIA"], ["JFK", "AXA"], ["ANU", "JFK"], ["ADL", "ANU"], ["TIA", "AUA"], ["ANU", "AUA"], ["ADL", "EZE"], ["ADL", "EZE"], ["EZE", "ADL"], ["AXA", "EZE"], ["AUA", "AXA"], ["JFK", "AXA"], ["AXA", "AUA"], ["AUA", "ADL"], ["ANU", "EZE"], ["TIA", "ADL"], ["EZE", "ANU"], ["AUA", "ANU"]]]
    expected: ["JFK", "AXA", "AUA", "ADL", "ANU", "AUA", "ANU", "EZE", "ADL", "EZE", "ANU", "JFK", "AXA", "EZE", "TIA", "AUA", "AXA", "TIA", "ADL", "EZE", "HBA"]
  # Additional 20 test cases
  - input: [[["JFK", "ZZZ"]]]
    expected: ["JFK", "ZZZ"]
  - input: [[["JFK", "ABC"], ["ABC", "DEF"]]]
    expected: ["JFK", "ABC", "DEF"]
  - input: [[["JFK", "DEF"], ["JFK", "ABC"], ["ABC", "JFK"]]]
    expected: ["JFK", "ABC", "JFK", "DEF"]
  - input: [[["JFK", "CCC"], ["JFK", "BBB"], ["JFK", "AAA"], ["AAA", "JFK"], ["BBB", "JFK"]]]
    expected: ["JFK", "AAA", "JFK", "BBB", "JFK", "CCC"]
  - input: [[["JFK", "LAX"], ["LAX", "SFO"], ["SFO", "JFK"]]]
    expected: ["JFK", "LAX", "SFO", "JFK"]
  - input: [[["JFK", "ORD"], ["ORD", "LAX"], ["LAX", "JFK"], ["JFK", "DEN"]]]
    expected: ["JFK", "ORD", "LAX", "JFK", "DEN"]
  - input: [[["JFK", "ATL"], ["ATL", "JFK"], ["JFK", "ATL"], ["ATL", "JFK"], ["JFK", "ATL"], ["ATL", "SFO"]]]
    expected: ["JFK", "ATL", "JFK", "ATL", "JFK", "ATL", "SFO"]
  - input: [[["JFK", "XYZ"], ["XYZ", "ABC"], ["ABC", "XYZ"], ["XYZ", "JFK"]]]
    expected: ["JFK", "XYZ", "ABC", "XYZ", "JFK"]
  - input: [[["JFK", "AAA"], ["AAA", "BBB"], ["BBB", "CCC"], ["CCC", "DDD"]]]
    expected: ["JFK", "AAA", "BBB", "CCC", "DDD"]
  - input: [[["JFK", "DDD"], ["JFK", "CCC"], ["JFK", "BBB"], ["JFK", "AAA"], ["AAA", "JFK"], ["BBB", "JFK"], ["CCC", "JFK"]]]
