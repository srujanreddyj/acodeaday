# =============================================================================
# Production Docker Compose for acodeaday
# =============================================================================
# This file is for end users who want to run acodeaday using pre-built images
# from Docker Hub or GitHub Container Registry.
#
# Usage:
#   1. Edit the environment variables below (search for "CHANGE_ME")
#   2. Run: docker compose -f docker-compose.prod.yml up -d
#
# Requirements:
#   - Docker with privileged container support (for Judge0)
#   - A PostgreSQL database (e.g., Supabase, or self-hosted)
#
# Note: The backend automatically runs database migrations and seeds problems
# on startup. No manual migration step is needed.
# =============================================================================

services:
  # ===========================================================================
  # Judge0 CE - Code Execution Engine
  # ===========================================================================
  # Judge0 requires: server, workers, redis, and its own postgres database
  # NOTE: Judge0 requires privileged mode for sandboxed code execution

  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: acodeaday-judge0-server
    command:
      [
        "bash",
        "-c",
        "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/server",
      ]
    volumes:
      - ./judge0-data:/data
    ports:
      - "2358:2358"
    privileged: true
    environment:
      # Redis connection
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379

      # Judge0's own PostgreSQL database
      - POSTGRES_HOST=judge0-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0password
      - POSTGRES_DB=judge0

      # Judge0 configuration
      - ENABLE_WAIT_RESULT=true
      - ENABLE_COMPILER_OPTIONS=false
      - ALLOWED_LANGUAGES_FOR_COMPILE_OPTIONS=
      - MAX_QUEUE_SIZE=1000
      - MAX_CPU_TIME_LIMIT=15
      - MAX_WALL_TIME_LIMIT=30
      - MAX_MEMORY_LIMIT=512000
      - MAX_STACK_LIMIT=128000
      - MAX_PROCESSES_AND_OR_THREADS=60
      - ENABLE_SUBMISSION_DELETE=false
      - ENABLE_CALLBACKS=false
      - CALLBACKS_MAX_TRIES=3
      - CALLBACKS_TIMEOUT=5

      # Enable per-process resource limits (avoids cgroups)
      - ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
      - ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true

    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acodeaday-network

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: acodeaday-judge0-workers
    command:
      [
        "bash",
        "-c",
        "sudo mkdir -p /box && sudo chmod 1777 /box && exec ./scripts/workers",
      ]
    volumes:
      - ./judge0-data:/data
    privileged: true
    environment:
      # Redis connection
      - REDIS_HOST=judge0-redis
      - REDIS_PORT=6379

      # Judge0's own PostgreSQL database
      - POSTGRES_HOST=judge0-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0password
      - POSTGRES_DB=judge0

      # Worker configuration (same as server)
      - ENABLE_WAIT_RESULT=true
      - ENABLE_COMPILER_OPTIONS=false
      - ALLOWED_LANGUAGES_FOR_COMPILE_OPTIONS=
      - MAX_QUEUE_SIZE=1000
      - MAX_CPU_TIME_LIMIT=15
      - MAX_WALL_TIME_LIMIT=30
      - MAX_MEMORY_LIMIT=512000
      - MAX_STACK_LIMIT=128000
      - MAX_PROCESSES_AND_OR_THREADS=60
      - ENABLE_SUBMISSION_DELETE=false
      - ENABLE_CALLBACKS=false
      - CALLBACKS_MAX_TRIES=3
      - CALLBACKS_TIMEOUT=5

      # Enable per-process resource limits (avoids cgroups)
      - ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
      - ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true

    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acodeaday-network

  judge0-db:
    image: postgres:13-alpine
    container_name: acodeaday-judge0-db
    environment:
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0password
      - POSTGRES_DB=judge0
    volumes:
      - judge0-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - acodeaday-network

  judge0-redis:
    image: redis:7-alpine
    container_name: acodeaday-judge0-redis
    command: redis-server --appendonly yes
    volumes:
      - judge0-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - acodeaday-network

  # ===========================================================================
  # Backend (FastAPI)
  # ===========================================================================
  # Pull from Docker Hub: engineeringwithtemi/acodeaday-backend:latest
  # Or from GHCR: ghcr.io/engineeringwithtemi/acodeaday-backend:latest
  #
  # The backend automatically runs migrations and seeds problems on startup.
  backend:
    image: ghcr.io/engineeringwithtemi/acodeaday-backend:latest
    container_name: acodeaday-backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # =========================================================================
      # DATABASE - REQUIRED (CHANGE_ME)
      # =========================================================================
      # Your PostgreSQL connection string (use postgresql+asyncpg:// prefix)
      # Example for Supabase: postgresql+asyncpg://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - DATABASE_URL=postgresql+asyncpg://postgres:CHANGE_ME@your-db-host:5432/postgres

      # =========================================================================
      # SUPABASE AUTH - REQUIRED (CHANGE_ME)
      # =========================================================================
      # Your Supabase project URL and anon key (from Supabase dashboard > Settings > API)
      - SUPABASE_URL=https://your-project.supabase.co
      - SUPABASE_KEY=your-supabase-anon-key

      # =========================================================================
      # DEFAULT USER - REQUIRED (CHANGE_ME)
      # =========================================================================
      # Email and password for the default admin user created on startup
      - DEFAULT_USER_EMAIL=admin@yourdomain.com
      - DEFAULT_USER_PASSWORD=CHANGE_ME_secure_password

      # =========================================================================
      # CORS ORIGINS - Configure allowed frontend URLs
      # =========================================================================
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173

      # =========================================================================
      # JUDGE0 - DO NOT CHANGE (uses internal Docker network)
      # =========================================================================
      - JUDGE0_URL=http://judge0-server:2358

      # =========================================================================
      # APP CONFIGURATION
      # =========================================================================
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_TO_FILE=true

      # =========================================================================
      # LLM API KEYS - OPTIONAL (for AI chat features)
      # =========================================================================
      # Add at least one API key to enable the AI chat assistant
      - GOOGLE_API_KEY=
      - OPENAI_API_KEY=
      - ANTHROPIC_API_KEY=

    volumes:
      - backend-logs:/app/logs
    depends_on:
      judge0-server:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - acodeaday-network

  # ===========================================================================
  # Frontend (TanStack Start with SSR)
  # ===========================================================================
  # Pull from Docker Hub: engineeringwithtemi/acodeaday-frontend:latest
  # Or from GHCR: ghcr.io/engineeringwithtemi/acodeaday-frontend:latest
  frontend:
    image: ghcr.io/engineeringwithtemi/acodeaday-frontend:latest
    container_name: acodeaday-frontend
    ports:
      - "3000:3000"
    environment:
      # =========================================================================
      # API URL - REQUIRED (CHANGE_ME)
      # =========================================================================
      # The external URL where the backend API is accessible from the browser
      # Examples:
      #   - Local: http://localhost:8000
      #   - Production: https://api.yourdomain.com
      - VITE_API_URL=http://localhost:8000

      # =========================================================================
      # SUPABASE AUTH - REQUIRED (CHANGE_ME)
      # =========================================================================
      # Same values as backend (from Supabase dashboard > Settings > API)
      - VITE_SUPABASE_URL=https://your-project.supabase.co
      - VITE_SUPABASE_KEY=your-supabase-anon-key

    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - acodeaday-network

# ===========================================================================
# Networks
# ===========================================================================
networks:
  acodeaday-network:
    driver: bridge

# ===========================================================================
# Volumes
# ===========================================================================
volumes:
  judge0-postgres-data:
    driver: local
  judge0-redis-data:
    driver: local
  backend-logs:
    driver: local
